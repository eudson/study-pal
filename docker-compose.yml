services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: studypal
      POSTGRES_PASSWORD: studypal
      POSTGRES_DB: studypal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studypal"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    # Optional: picks up .env when present (e.g. STUDYPAL_ANTHROPIC_API_KEY);
    # required:false keeps `make dev` working on a clean checkout with no .env.
    env_file:
      - path: .env
        required: false
    environment:
      # Explicit → wins over .env, so `make dev` always uses the local db and
      # never accidentally points the dev stack at real Supabase.
      STUDYPAL_DB_DSN: "postgresql://studypal:studypal@db:5432/studypal"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    command: pnpm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      # Browser talks to the API through the Vite dev proxy (same-origin),
      # so this default keeps browser requests relative. Optional override only.
      VITE_API_BASE_URL: ""
      # The dev proxy itself runs inside the web container and reaches the API
      # over the compose network (localhost:8000 when running pnpm dev directly).
      API_PROXY_TARGET: "http://api:8000"
    depends_on:
      - api
